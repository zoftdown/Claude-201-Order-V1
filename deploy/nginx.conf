# Nginx config for Order System at dr89.cloud/order/
# Copy to: /etc/nginx/sites-available/order
# Then: ln -s /etc/nginx/sites-available/order /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

location /order {
    # Authentication is handled by Django (built-in login at /order/login/).
    # Do NOT enable nginx auth_basic here.
    proxy_pass http://127.0.0.1:8100;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Script-Name /order;

    client_max_body_size 20M;
}

# Media files (uploaded images)
location /order/media/ {
    alias /opt/order/media/;
    expires 30d;
    add_header Cache-Control "public, immutable";
}
