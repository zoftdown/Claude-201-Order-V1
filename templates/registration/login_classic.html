<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบออร์เดอร์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #2c3e50; min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 380px; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card shadow">
            <div class="card-body p-4">
                <h4 class="text-center mb-4">ระบบออร์เดอร์ร้านพิมพ์เสื้อ</h4>

                {% if form.non_field_errors %}
                <div class="alert alert-danger py-2">
                    {{ form.non_field_errors.0 }}
                </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">ชื่อผู้ใช้</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">รหัสผ่าน</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
                    <button type="submit" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
