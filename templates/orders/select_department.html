<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เลือกแผนก — ระบบออร์เดอร์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f5f7;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Sarabun", sans-serif;
        }
        .wrap {
            max-width: 480px;
            margin: 0 auto;
            padding: 1.5rem 1rem 2rem;
        }
        h1 {
            text-align: center;
            margin: 0.5rem 0 0.25rem;
            font-size: 1.5rem;
            color: #2c3e50;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .dept-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        .dept-form { margin: 0; }
        .dept-btn {
            width: 100%;
            min-height: 110px;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 700;
            font-size: 1.15rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
            transition: transform 0.08s ease, box-shadow 0.15s ease;
            cursor: pointer;
            padding: 0.5rem;
        }
        .dept-btn:hover { box-shadow: 0 4px 10px rgba(0, 0, 0, 0.22); }
        .dept-btn:active { transform: scale(0.96); }
        .dept-btn.is-current {
            outline: 3px solid #f1c40f;
            outline-offset: 2px;
        }
        .dept-icon { font-size: 2rem; line-height: 1; }
        .dept-name { font-size: 1.1rem; }
        .footnote {
            text-align: center;
            color: #95a5a6;
            font-size: 0.8rem;
            margin-top: 1.5rem;
        }
        .current-banner {
            background: #fff8dc;
            border: 1px solid #f1c40f;
            color: #7d5e00;
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        @media (min-width: 600px) {
            .dept-btn { min-height: 130px; font-size: 1.25rem; }
            .dept-icon { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>เลือกแผนก</h1>
        <p class="subtitle">เลือกครั้งเดียว — ระบบจะจำไว้ 1 ปี</p>

        {% if current_slug %}
        <div class="current-banner">
            แผนกปัจจุบัน: <strong>{{ current_slug }}</strong> — กดเลือกใหม่เพื่อเปลี่ยน
        </div>
        {% endif %}

        <div class="dept-grid">
            {% for dept in departments %}
            <form method="post" action="" class="dept-form">
                {% csrf_token %}
                <input type="hidden" name="department" value="{{ dept.slug }}">
                {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
                <button type="submit"
                        class="dept-btn {% if dept.slug == current_slug %}is-current{% endif %}"
                        style="background-color: {{ dept.color }};"
                        aria-label="เลือกแผนก {{ dept.name }}">
                    <span class="dept-icon" aria-hidden="true">{{ dept.icon }}</span>
                    <span class="dept-name">{{ dept.name }}</span>
                </button>
            </form>
            {% endfor %}
        </div>

        <p class="footnote">ระบบสำหรับฝ่ายผลิต — ไม่ต้อง login</p>
    </div>
</body>
</html>
