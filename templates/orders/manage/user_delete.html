{% extends "base.html" %}
{% block title %}ลบ user {{ target.username }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h4 class="mb-0">ลบ user</h4>
    <a href="{% url 'user_list' %}" class="btn btn-outline-secondary btn-sm">กลับ</a>
</div>

<div class="card p-3" style="max-width:520px;">
    <p class="mb-2">ลบ user <strong>"{{ target.username }}"</strong> ทิ้งจริง?</p>
    <p class="text-danger small mb-3">การกระทำนี้ไม่สามารถย้อนกลับได้</p>

    <form method="post" class="d-flex gap-2 m-0">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">ยืนยันลบ</button>
        <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">ยกเลิก</a>
    </form>
</div>
{% endblock %}
