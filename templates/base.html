<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ระบบออร์เดอร์{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .special-note { color: red; font-weight: bold; }
        .navbar { background-color: #2c3e50; }
        .card-item { border-left: 4px solid #3498db; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'order_list' %}">ระบบออร์เดอร์ร้านพิมพ์เสื้อ</a>
            <a href="{% url 'order_create' %}" class="btn btn-success btn-sm">+ สร้างออร์เดอร์</a>
        </div>
    </nav>

    <div class="container-fluid px-3">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
